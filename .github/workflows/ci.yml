name: CI (lint, type, tests)

on:
  pull_request:
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Ruff (lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py311-${{ hashFiles('api/pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-py311-
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e api[dev]
      - name: Ruff check
        run: ruff check api tests
      - name: Ruff format (verify)
        run: ruff format --check api tests
      - name: Docs check
        run: make docs-check

  type:
    name: mypy (type-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py311-${{ hashFiles('api/pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-py311-
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e api[dev]
      - name: mypy
        run: mypy api

  test:
    name: pytest (with Firestore emulator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py311-${{ hashFiles('api/pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-py311-
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e api[dev]

      # ---- Start Firestore emulator (CI uses emulator only; no real GCP or JSON keys) ----
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Set up JDK for Firestore emulator
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install Firebase CLI
        run: npm i -g firebase-tools
      - name: Start Firestore emulator (bg) and wait
        run: |
          firebase emulators:start --only firestore --project gsm-dev-f70d0 --config ./firebase.json &
          for i in {1..60}; do nc -z 127.0.0.1 8082 && break; sleep 1; done
          nc -z 127.0.0.1 8082

      - name: pytest
        env:
          FIRESTORE_EMULATOR_HOST: 127.0.0.1:8082
          GOOGLE_CLOUD_PROJECT: gsm-dev-f70d0
          FIREBASE_PROJECT_ID: gsm-dev-f70d0
          # ---- Auth/Settings for B1 (token verify is mocked, but settings expect a project id) ----
          # Optional (browser CORS only; safe to omit)
          CORS_ORIGINS: http://localhost:3000
        # Runs auth regressions, health/readiness, and observability-related tests.
        run: pytest -q

      - name: Seed emulator for cache integrity check
        env:
          FIRESTORE_EMULATOR_HOST: 127.0.0.1:8082
          GOOGLE_CLOUD_PROJECT: gsm-dev-f70d0
          FIREBASE_PROJECT_ID: gsm-dev-f70d0
        run: python -m tools.seed_firestore --env=emu

      - name: Cache integrity check (read-only)
        env:
          FIRESTORE_EMULATOR_HOST: 127.0.0.1:8082
          GOOGLE_CLOUD_PROJECT: gsm-dev-f70d0
          FIREBASE_PROJECT_ID: gsm-dev-f70d0
        run: python -m tools.check_cache_integrity --env emu --limit 50
