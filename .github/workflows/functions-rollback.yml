name: Rollback Firebase Functions (manual)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [ "dev", "prod" ]
      project_id:
        description: "Override Firebase project id (defaults to the environment's GCP_PROJECT_ID secret)"
        required: false
        type: string
      revision:
        description: "Target revision SHA/tag (optional; defaults to last DEPLOYED entry for the env)"
        required: false
        type: string

jobs:
  rollback-functions:
    # Prod rollback is gated by the `prod` Environment's required reviewers.
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest
    env:
      DEPLOY_ENV: ${{ inputs.environment }}
      PROJECT_ID: ${{ inputs.project_id || secrets.GCP_PROJECT_ID }}
      REVISION: ${{ inputs.revision }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Firebase CLI
        run: npm i -g firebase-tools

      - name: Rollback Functions
        run: |
          if [ -n "$REVISION" ]; then
            ./scripts/rollback_functions.sh --project "$PROJECT_ID" --env "$DEPLOY_ENV" --revision "$REVISION"
          else
            ./scripts/rollback_functions.sh --project "$PROJECT_ID" --env "$DEPLOY_ENV"
          fi
