name: Rollback Firebase Functions (manual)

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: "Firebase project id (defaults to secret GCP_PROJECT_ID)"
        required: false
        type: string
      revision:
        description: "Target revision SHA/tag (optional; defaults to last DEPLOYED entry)"
        required: false
        type: string

jobs:
  rollback-functions:
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: ${{ inputs.project_id || secrets.GCP_PROJECT_ID }}
      REVISION: ${{ inputs.revision }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Firebase CLI
        run: npm i -g firebase-tools

      - name: Rollback Functions
        run: |
          if [ -n "$REVISION" ]; then
            ./scripts/rollback_functions.sh --project "$PROJECT_ID" --revision "$REVISION"
          else
            ./scripts/rollback_functions.sh --project "$PROJECT_ID"
          fi
