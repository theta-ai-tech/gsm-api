name: Build & Deploy to Cloud Run

on:
  push:
    branches: [ "main" ]     # change if your default branch differs
  workflow_dispatch: {}       # allow manual runs

jobs:
  deploy:
    permissions:
      id-token: write         # needed for WIF
      contents: read
    runs-on: ubuntu-latest

    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGION: ${{ secrets.GCP_REGION }}
      AR_REPO: ${{ secrets.AR_REPO || 'gsm-api' }}
      SERVICE_NAME: ${{ secrets.SERVICE_NAME || 'gsm-api' }}
      IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.AR_REPO || 'gsm-api' }}/${{ secrets.SERVICE_NAME || 'gsm-api' }}:${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker $REGION-docker.pkg.dev -q

      - name: Build image
        run: docker build -t "$IMAGE" .

      - name: Push image
        run: docker push "$IMAGE"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --image "$IMAGE" \
            --region "$REGION" \
            --service-account "gsm-api-runtime@${PROJECT_ID}.iam.gserviceaccount.com" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --quiet
