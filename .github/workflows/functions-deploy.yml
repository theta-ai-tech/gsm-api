name: Deploy Firebase Functions (manual)

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: "Firebase project id (defaults to secret GCP_PROJECT_ID)"
        required: false
        type: string

jobs:
  deploy-functions:
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: ${{ inputs.project_id || secrets.GCP_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Firebase CLI
        run: npm i -g firebase-tools

      - name: Deploy Functions (with smoke)
        run: ./scripts/deploy_functions.sh --project "$PROJECT_ID"
